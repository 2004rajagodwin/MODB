<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Our Expertise</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <style>
    /* ===== OUR EXPERTISE SECTION ===== */
    .mo-ourexper-section {
      background-color: #E2EFE9;
      padding: 60px 0;
      overflow: hidden;
    }

    .mo-ourexper-section-left h5 {
      display: inline-block;
      padding: 5px 14px;
      border: 1.5px solid;
      border-image-source: linear-gradient(
        180deg,
        #188c37 0%,
        #ec322d 50%,
        #facc04 75%,
        #76addc 100%
      );
      border-image-slice: 1;
      border-radius: 20px;
      color: #1c672d;
      font-weight: 500;
      margin-bottom: 20px;
    }

    .mo-ourexper-section-left h2 {
      font-weight: 700;
      font-size: 36px;
      margin-bottom: 15px;
    }

    .mo-ourexper-section-left p {
      color: #666;
      margin-bottom: 30px;
    }

    .mo-progress-item {
      margin-bottom: 30px;
    }

    .mo-progress-title {
      font-weight: 600;
      margin-bottom: 8px;
    }

    .mo-progress-bar {
      position: relative;
      height: 6px;
      background-color: #ddd;
      border-radius: 5px;
      overflow: visible;
    }

    .mo-progress-fill {
      height: 100%;
      width: 0;
      background: linear-gradient(
        90deg,
        #eb2c2e 0%,
        #fac607 50%,
        #30b454 75%,
        #6bcbc3 87.5%,
        #6178ba 93.75%,
        #563a8f 100%
      );
      border-radius: 5px;
      transition: width 1.8s ease;
      position: relative;
    }

    /* Moving percentage bubble */
    .mo-progress-percent {
      position: absolute;
      top: 17px;
      right: 0;
      transform: translateX(50%);
      font-size: 13px;
      background: #fff;
      border: 1px solid #30b454;
      border-radius: 12px;
      padding: 2px 8px;
      font-weight: 600;
      color: #000;
      white-space: nowrap;
    }

    /* Optional animated circle */
    .mo-progress-dot {
      position: absolute;
      right: 0;
      top: 50%;
      transform: translate(50%, -50%);
      width: 14px;
      height: 14px;
      background: #fff;
      border: 3px solid #30b454;
      border-radius: 50%;
      box-shadow: 0 0 0 2px #fff;
    }

    .mo-ourexper-section-right img {
      width: 100%;
    }

    /* Responsive adjustments */
    @media (max-width: 768px) {
      .mo-ourexper-section {
        padding: 60px 0;
      }

      .mo-ourexper-section-left h2 {
        font-size: 28px;
      }

      .mo-ourexper-section-right {
        margin-top: 40px;
      }
    }
  </style>
</head>
<body>
  <section class="mo-ourexper-section">
    <div class="container">
      <div class="row align-items-center">
        <!-- LEFT -->
        <div class="col-md-6">
          <div class="mo-ourexper-section-left">
           <h6 class="new-mo-about-tag-a">Our Skills</h6>
            <h2>Our Expertise</h2>
            <p>
              We combine engineering precision and design innovation to deliver
              sustainable, high-performance buildings.
            </p>

            <div class="mo-progress-item">
              <div class="mo-progress-title">Building Performance Analysis</div>
              <div class="mo-progress-bar">
                <div class="mo-progress-fill" data-target="90">
                  <span class="mo-progress-percent">0%</span>
                  <span class="mo-progress-dot"></span>
                </div>
              </div>
            </div>

            <div class="mo-progress-item">
              <div class="mo-progress-title">Sustainable Design Strategy</div>
              <div class="mo-progress-bar">
                <div class="mo-progress-fill" data-target="95">
                  <span class="mo-progress-percent">0%</span>
                  <span class="mo-progress-dot"></span>
                </div>
              </div>
            </div>

            <div class="mo-progress-item">
              <div class="mo-progress-title">
                Data Visualization & Simulation
              </div>
              <div class="mo-progress-bar">
                <div class="mo-progress-fill" data-target="85">
                  <span class="mo-progress-percent">0%</span>
                  <span class="mo-progress-dot"></span>
                </div>
              </div>
            </div>

            <div class="mo-progress-item">
              <div class="mo-progress-title">
                Energy Optimization & Efficiency
              </div>
              <div class="mo-progress-bar">
                <div class="mo-progress-fill" data-target="90">
                  <span class="mo-progress-percent">0%</span>
                  <span class="mo-progress-dot"></span>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- RIGHT -->
        <div class="col-md-6">
          <div class="mo-ourexper-section-right">
            <img class="mo-ourexper-section-right-imm"
              src="images/pcc2.png"
              alt="Building Performance Analysis"
            />
          </div>
        </div>
      </div>
    </div>
  </section>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const progressBars = document.querySelectorAll(".mo-progress-fill");

      const observer = new IntersectionObserver(
        (entries) => {
          entries.forEach((entry) => {
            if (entry.isIntersecting) {
              animateBar(entry.target);
              observer.unobserve(entry.target);
            }
          });
        },
        { threshold: 0.4 }
      );

      progressBars.forEach((bar) => observer.observe(bar));

      function animateBar(fill) {
        const target = +fill.getAttribute("data-target");
        const percent = fill.querySelector(".mo-progress-percent");
        const dot = fill.querySelector(".mo-progress-dot");

        fill.style.width = target + "%";

        let current = 0;
        const duration = 1800;
        const stepTime = 20;
        const totalSteps = duration / stepTime;
        const increment = target / totalSteps;

        const interval = setInterval(() => {
          current += increment;
          if (current >= target) {
            current = target;
            clearInterval(interval);
          }
          percent.textContent = Math.round(current) + "%";

          // Keep the percentage and dot at the right end of the progress bar
          percent.style.right = "0";
          dot.style.right = "0";
        }, stepTime);
      }
    });
  </script>
</body>
</html>
